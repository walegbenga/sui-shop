version: '3.8'

services:
  # Sui Contract Deployment
  sui-deploy:
    build:
      context: .
      dockerfile: contracts/Dockerfile
    container_name: sui-shop-deploy
    volumes:
      - ./move:/contracts
      - sui-wallet:/root/.sui
    stdin_open: true
    tty: true
    networks:
      - sui-network

volumes:
  sui-wallet:
    driver: local

networks:
  sui-network:
    driver: bridge
